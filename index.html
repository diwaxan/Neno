            margin-bottom: 25px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;

            grid-template-columns: 1fr;

            color: white;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            font-size: 18px;
            cursor: pointer;

        }

            color: #000;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playStrongSound(isCorrect) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);

            if (isCorrect) {
                masterGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                [523, 659, 784].forEach((f, i) => {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.08));
                    g.gain.setValueAtTime(0.5, audioCtx.currentTime + (i * 0.08));
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.08) + 0.5);
                    osc.connect(g); g.connect(masterGain);
                    osc.start(audioCtx.currentTime + (i * 0.08));
                    osc.stop(audioCtx.currentTime + (i * 0.08) + 0.5);
                });
            } else {
                masterGain.gain.setValueAtTime(1.0, audioCtx.currentTime); 
                [220, 180].forEach((f, i) => {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.12));
                    g.gain.setValueAtTime(0.8, audioCtx.currentTime + (i * 0.12));
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.12) + 0.3);
                    osc.connect(g); g.connect(masterGain);
                    osc.start(audioCtx.currentTime + (i * 0.12));
                    osc.stop(audioCtx.currentTime + (i * 0.12) + 0.3);
                });
            }
        }

            {q: "کام ڤیتامین بۆ چاو زۆر باشە؟", a: ["A", "B", "C", "D"], correct: 0},
            {q: "کۆنترین زانکۆ لە جیهاندا کامەیە؟", a: ["هارڤارد", "ئۆکسفۆرد", "قەروین", "بۆلۆنیا"], correct: 2},
            {q: "کام ماددە ڕەقترینە لە سروشتدا؟", a: ["ئاسن", "بەرد", "ئەڵماس", "مس"], correct: 2},

            {q: "کام وڵات بە 'وڵاتی نیل' ناسراوە؟", a: ["سودان", "میسر", "ئیتیۆپیا", "کینیا"], correct: 1},
            {q: "چەند نیوەچڵ (کاتی) لە یاری تۆپی پێدا هەیە؟", a: ["١", "٢", "٣", "٤"], correct: 1},
            {q: "کام کانزا لەناو پەنیر و شیردا هەیە بۆ ئێسک؟", a: ["ئاسن", "پۆتاسیۆم", "کالسیۆم", "مەگنیسیۆم"], correct: 2},

            {q: "دوایین پرسیار: ١٠٠ دابەشی ٢ چەند دەکات؟", a: ["١٠", "٢٠", "٥٠", "١٠٠"], correct: 2}
        ];

        let currentIdx = 0;

        function loadQuestion() {
            const data = myQuestions[currentIdx];
            document.getElementById("qNum").innerText = currentIdx + 1;
            document.getElementById("question").innerText = data.q;
            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";
            document.getElementById("nextBtn").style.display = "none";

            data.a.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = "option";
                btn.innerText = opt;
                btn.onclick = function() { check(this, index === data.correct); };
                optionsDiv.appendChild(btn);
            });
        }

        function check(element, isCorrect) {
            const allButtons = document.querySelectorAll(".option");
            allButtons.forEach(b => b.onclick = null); 

            if (isCorrect) {
                element.classList.add('correct');
                playStrongSound(true);
            } else {
                element.classList.add('wrong');
                playStrongSound(false); 
                const correctIdx = myQuestions[currentIdx].correct;
                allButtons[correctIdx].classList.add('correct');
            }
            document.getElementById("nextBtn").style.display = "inline-block";
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < myQuestions.length) {
                loadQuestion();
            } else {
                document.getElementById("question").innerText = "پیرۆزە ماردین! هەموو ١٠٠ پرسیارەکەت بە سەرکەوتوویی تەواو کرد.";
                document.getElementById("options").innerHTML = "👑🏆✨";
                document.getElementById("nextBtn").style.display = "none";
            }
        }

        function jumpToQuestion() {
            const val = parseInt(document.getElementById("jumpInput").value);
            if (val >= 1 && val <= myQuestions.length) {
                currentIdx = val - 1;
                loadQuestion();
            } else {
                alert("تکایە ژمارەیەک لە نێوان ١ بۆ ١٠٠ بنووسە");
            }
        }

        loadQuestion();
    </script>
</body>
